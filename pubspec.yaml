name: radioxr
description: Radio App Theme.
publish_to: 'none'
version: 2.1.0+7

environment:
  sdk: ^3.9.2


dependencies:
  flutter:
    sdk: flutter
  font_awesome_flutter: ^11.0.0
  url_launcher: ^6.3.2
  radio_player: ^2.2.1
  share_plus: ^11.0.0
  flutter_markdown: ^0.7.7
  google_mobile_ads: ^7.0.0
  provider: ^6.1.5+1
  sleek_circular_slider: ^2.0.1
  volume_regulator: ^2.4.1
  http: ^1.6.0
  dart_common_utils: ^1.0.0
  mini_music_visualizer: ^1.1.4
  in_app_review: ^2.0.11
  text_scroll: ^0.2.0
  flutter_native_splash: ^2.4.7
  html: ^0.15.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  change_app_package_name: ^1.5.0
  flutter_lints: ^5.0.0

flutter_native_splash:
  color: "#083160"
  image: assets/splash/splash.png
  android: true
  ios: true

  android_12:
    color: "#083160"
    color_dark: "#083160"
    image: assets/splash/splash12.png
    image_dark: assets/splash/splash12.png

    
flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/text/
  fonts:
      - family: Poppins
        fonts:
          - asset: fonts/Poppins-Regular.ttf
          - asset: fonts/Poppins-Italic.ttf
            style: italic
  

flutter_launcher_icons:
  image_path: "assets/images/appIcon.png"
  adaptive_icon_foreground: "assets/appicon/appicon-adaptive.png"
  android: true
  ios: true
  remove_alpha_ios: true
  